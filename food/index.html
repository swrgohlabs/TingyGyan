<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wanting &amp; Ryan — Food Preferences</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">

  <style>
    :root {
      --ink:       #1a1510;
      --gold:      #c9a96e;
      --gold-pale: #e8d5b0;
      --gold-dim:  #a07d48;
      --cream:     #faf6ef;
      --parchment: #f3eade;
      --warm-mid:  #7a6a52;
      --border:    rgba(201,169,110,0.28);
      --serif:     'Cormorant Garamond', Georgia, serif;
      --sans:      'Jost', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; overflow-x: hidden; }

    body {
      font-family: var(--sans);
      font-weight: 300;
      color: var(--ink);
      background: var(--cream);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── NOISE GRAIN OVERLAY ─────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 999;
      opacity: 0.028;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 256px 256px;
    }

    /* ── HEADER ──────────────────────────────────────────── */
    header {
      background: var(--ink);
      padding: 3rem 2rem 2.5rem;
      text-align: center;
      border-bottom: 1px solid rgba(201,169,110,0.2);
    }

    .header-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      font-family: var(--sans);
      font-size: 0.58rem;
      font-weight: 400;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1rem;
    }
    .header-eyebrow::before,
    .header-eyebrow::after {
      content: '';
      display: block;
      width: 1.5rem;
      height: 1px;
      background: var(--gold-dim);
    }

    header h1 {
      font-family: var(--serif);
      font-size: clamp(2rem, 6vw, 3.2rem);
      font-weight: 300;
      color: #fff;
      line-height: 1.1;
      margin-bottom: 0.5rem;
    }

    header h1 em {
      font-style: italic;
      color: var(--gold-pale);
    }

    .header-sub {
      font-family: var(--serif);
      font-size: clamp(0.9rem, 2vw, 1.1rem);
      font-style: italic;
      font-weight: 300;
      color: rgba(232,213,176,0.7);
      margin-top: 0.6rem;
    }

    /* ── MAIN ────────────────────────────────────────────── */
    main {
      flex: 1;
      padding: 3rem 1.5rem 4rem;
      max-width: 52rem;
      margin: 0 auto;
      width: 100%;
    }

    .intro {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .intro p {
      font-size: 0.875rem;
      font-weight: 300;
      color: var(--warm-mid);
      line-height: 1.85;
      max-width: 36rem;
      margin: 0 auto;
    }

    /* ── FORM WRAP ───────────────────────────────────────── */
    .form-wrap {
      border: 1px solid var(--border);
      border-radius: 2px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 12px 40px rgba(26,21,16,0.08);
    }

    .form-wrap iframe {
      width: 100%;
      height: 700px;
      border: 0;
      display: block;
    }

    /* ── FOOTER ──────────────────────────────────────────── */
    footer {
      background: var(--ink);
      border-top: 1px solid rgba(201,169,110,0.2);
      text-align: center;
      padding: 2rem;
    }

    .footer-monogram {
      font-family: var(--serif);
      font-size: 1.8rem;
      font-weight: 300;
      font-style: italic;
      color: var(--gold);
      display: block;
      margin-bottom: 0.4rem;
    }

    footer p {
      font-size: 0.58rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(201,169,110,0.45);
    }

    /* ── RESPONSIVE ──────────────────────────────────────── */
    @media (max-width: 640px) {
      header { padding: 2.2rem 1.5rem 2rem; }
      main   { padding: 2rem 1rem 3rem; }
      .form-wrap iframe { height: 780px; }
    }
  </style>
</head>

<body>

  <header>
    <p class="header-eyebrow">12 September 2026</p>
    <h1>Wanting <em>&amp;</em> Ryan</h1>
    <p class="header-sub">Food &amp; Dietary Preferences</p>
  </header>

  <main>
    <div class="intro">
      <p>
        Please let us know your meal preferences and any dietary requirements
        so we can make sure the evening is comfortable for everyone.
      </p>
    </div>

    <div class="form-wrap">
      <iframe
        title="Food Preferences Form"
        src="https://forms.gle/2FprBb1ES3bkL4vC9"
        loading="lazy">
      </iframe>
    </div>
  </main>

  <footer>
    <span class="footer-monogram">W &amp; R</span>
    <p>12 · September · 2026 &nbsp;·&nbsp; CHIJMES, Singapore</p>
  </footer>

</body>
</html>
